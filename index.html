<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match-3 Game Pro - Photo Background</title>
    <style>
        :root {
            /* Ganti URL di bawah dengan link foto latar belakang Anda */
            --bg-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiiU2cMtk8DB3o87Dqyb3UJc3RGrodFDvtw8kdSFf3w5zsSn4Tr0XZDRiaAF-ad71ffiBcRR8q8ezOty6HuNRi_EfbcWeFnIkPhhGOi2iz2WBQgqKrOslv-ESOyngcxyCke9H18ovRFkXdF4pg90zo33W9Z0kftop1g5Wu01gEnAlGq_eRZmhdA_jhw4jE/s320/IMG_20260317_213724_1.jpg');
            --grid-panel: rgba(15, 52, 96, 0.8); /* Biru transparan */
            --accent: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
            /* Setup Background Foto */
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay gelap agar grid lebih menonjol */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 360px;
            z-index: 1;
        }

        .score-box {
            background: var(--accent);
            color: #333;
            padding: 10px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-weight: 800;
            font-size: 24px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            background: var(--grid-panel);
            padding: 10px;
            border-radius: 15px;
            border: 4px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); /* Efek blur kaca */
            margin: 0 auto;
            width: 300px;
            height: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid div {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .grid div:active {
            transform: scale(0.9);
        }

        .instruction {
            margin-top: 15px;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box">💎 <span id="score">0</span></div>
    <div class="grid" id="grid"></div>
    <p class="instruction">Geser untuk mencocokkan permata</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const grid = document.querySelector('#grid');
    const scoreDisplay = document.querySelector('#score');
    const width = 8;
    const squares = [];
    let score = 0;

    // Warna yang lebih cerah agar kontras dengan background
    const colors = [
        '#FF3E3E', // Red
        '#FFEE58', // Yellow
        '#29B6F6', // Blue
        '#66BB6A', // Green
        '#AB47BC', // Purple
        '#FFA726'  // Orange
    ];

    function createBoard() {
        for (let i = 0; i < width * width; i++) {
            const square = document.createElement('div');
            square.setAttribute('id', i);
            let randomColor = colors[Math.floor(Math.random() * colors.length)];
            square.style.backgroundColor = randomColor;
            grid.appendChild(square);
            squares.push(square);

            square.addEventListener('mousedown', startSwipe);
            square.addEventListener('touchstart', startSwipe, {passive: false});
            square.addEventListener('mouseup', endSwipe);
            square.addEventListener('touchend', endSwipe);
        }
    }

    let startX, startY, squareIdPressed;

    function startSwipe(e) {
        squareIdPressed = parseInt(this.id);
        startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
    }

    function endSwipe(e) {
        let endX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        let endY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;

        let diffX = endX - startX;
        let diffY = endY - startY;

        let targetId;
        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (Math.abs(diffX) > 20) targetId = diffX > 0 ? squareIdPressed + 1 : squareIdPressed - 1;
        } else {
            if (Math.abs(diffY) > 20) targetId = diffY > 0 ? squareIdPressed + width : squareIdPressed - width;
        }

        // Validasi agar tidak keluar grid saat swipe samping
        if (targetId !== undefined && squares[targetId]) {
             // Mencegah swipe tembus ke baris sebelah
             if (Math.abs(diffX) > Math.abs(diffY)) {
                 if (Math.floor(targetId/width) !== Math.floor(squareIdPressed/width)) return;
             }
             swapSquares(squareIdPressed, targetId);
        }
    }

    function swapSquares(id1, id2) {
        let color1 = squares[id1].style.backgroundColor;
        let color2 = squares[id2].style.backgroundColor;

        squares[id1].style.backgroundColor = color2;
        squares[id2].style.backgroundColor = color1;

        setTimeout(() => {
            if (!checkMatches()) {
                squares[id1].style.backgroundColor = color1;
                squares[id2].style.backgroundColor = color2;
            }
        }, 200);
    }

    function checkMatches() {
        let matched = false;
        for (let i = 0; i < 64; i++) {
            let color = squares[i].style.backgroundColor;
            if (color === '') continue;

            if (i % 8 < 6 && squares[i+1].style.backgroundColor === color && squares[i+2].style.backgroundColor === color) {
                squares[i].style.backgroundColor = squares[i+1].style.backgroundColor = squares[i+2].style.backgroundColor = '';
                score += 10; matched = true;
            }
            if (i < 48 && squares[i+width].style.backgroundColor === color && squares[i+width*2].style.backgroundColor === color) {
                squares[i].style.backgroundColor = squares[i+width].style.backgroundColor = squares[i+width*2].style.backgroundColor = '';
                score += 10; matched = true;
            }
        }
        if (matched) {
            scoreDisplay.innerHTML = score;
            setTimeout(fillGaps, 250);
        }
        return matched;
    }

    function fillGaps() {
        for (let i = 0; i < 64; i++) {
            if (squares[i].style.backgroundColor === '') {
                squares[i].style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            }
        }
    }

    createBoard();
    setInterval(checkMatches, 400);
});
</script>
</body>
</html>
